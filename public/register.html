<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Fuel QR System</title>
  <meta name="description" content="Register a new account on the Fuel QR Scan System.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo">
      <div class="logo-icon">⛽</div>
      <h1>Create Account</h1>
      <p>Register as a vehicle owner</p>
    </div>

    <div id="alert" class="hidden"></div>

    <form id="registerForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">First Name</label>
          <input type="text" id="first_name" class="form-control" placeholder="Kasun" required>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Last Name</label>
          <input type="text" id="last_name" class="form-control" placeholder="Perera" required>
        </div>
      </div>
      <div class="form-group mt-4">
        <label class="form-label">Mobile Number</label>
        <input type="tel" id="mobile" class="form-control" placeholder="0771234567" required maxlength="10" pattern="[0-9]{10}">
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input type="text" id="address" class="form-control" placeholder="Negombo, Western Province" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm_password" class="form-control" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="regBtn">
        <span id="btnText">Create Account</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>
    </form>

    <div class="divider"><span>Already have an account?</span></div>
    <a href="/login.html" class="btn btn-outline btn-full">Sign In</a>
  </div>
</div>

<script>
  const form = document.getElementById('registerForm');
  const alertEl = document.getElementById('alert');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');
  const regBtn = document.getElementById('regBtn');

  function showAlert(msg, type = 'error') {
    alertEl.className = `alert alert-${type}`;
    alertEl.textContent = msg;
    alertEl.classList.remove('hidden');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.classList.add('hidden');

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    if (password !== confirm) return showAlert('Passwords do not match.');

    btnText.textContent = 'Creating account...';
    btnSpinner.classList.remove('hidden');
    regBtn.disabled = true;

    const body = {
      first_name: document.getElementById('first_name').value.trim(),
      last_name: document.getElementById('last_name').value.trim(),
      mobile: document.getElementById('mobile').value.trim(),
      address: document.getElementById('address').value.trim(),
      password
    };

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed.');

      showAlert('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login.html', 1800);
    } catch (err) {
      showAlert(err.message);
      btnText.textContent = 'Create Account';
      btnSpinner.classList.add('hidden');
      regBtn.disabled = false;
    }
  });
</script>
</body>
</html>
