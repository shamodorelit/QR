<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Fuel QR System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🛡</div>
      <div>
        <div class="brand-name">Fuel QR Admin</div>
        <div class="brand-sub">Management Portal</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="active"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/admin/users.html"><span class="nav-icon">👥</span> Users</a>
      <a href="/admin/vehicles.html"><span class="nav-icon">🚗</span> Vehicles</a>
      <a href="/scan.html" target="_blank"><span class="nav-icon">📡</span> Scan Portal</a>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()" class="btn btn-danger" style="width:100%;border-radius:var(--radius-sm);">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1>📊 Dashboard</h1>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:2px;" id="adminGreet"></p>
      </div>
      <div class="topbar-right">
        <span class="badge badge-purple">🛡 Admin</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon blue">👥</div><div class="stat-info"><div class="value">—</div><div class="label">Total Users</div></div></div>
      <div class="stat-card"><div class="stat-icon cyan">🚗</div><div class="stat-info"><div class="value">—</div><div class="label">Total Vehicles</div></div></div>
      <div class="stat-card"><div class="stat-icon green">📡</div><div class="stat-info"><div class="value">—</div><div class="label">Total Scans</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">⛽</div><div class="stat-info"><div class="value">—</div><div class="label">Fuel Sheds</div></div></div>
    </div>

    <!-- Recent Scan Activity -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">📡 Recent Scan Activity</span>
      </div>
      <div id="scanLogsContainer"><div class="empty-state"><div class="spinner"></div></div></div>
    </div>
  </main>
</div>

<script>
  const token = localStorage.getItem('fuelqr_admin_token');
  if (!token) window.location.href = '/admin/index.html';

  const admin = JSON.parse(localStorage.getItem('fuelqr_admin') || '{}');
  document.getElementById('adminGreet').textContent = `Logged in as ${admin.name || 'Administrator'}`;

  function logout() {
    localStorage.removeItem('fuelqr_admin_token');
    localStorage.removeItem('fuelqr_admin');
    window.location.href = '/admin/index.html';
  }

  function authHeaders() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/admin/stats', { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) { logout(); return; }
      const data = await res.json();
      const cards = document.querySelectorAll('#statsGrid .stat-card');
      const values = [data.totalUsers, data.totalVehicles, data.totalScans, data.fuelSheds];
      cards.forEach((c, i) => c.querySelector('.value').textContent = values[i]);
    } catch (err) {
      console.error('Stats error:', err);
    }
  }

  async function loadScanLogs() {
    try {
      const res = await fetch('/api/admin/scan-logs', { headers: authHeaders() });
      const logs = await res.json();
      const container = document.getElementById('scanLogsContainer');

      if (logs.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><h3>No scans recorded</h3><p>Scan activity will appear here after QR codes are scanned.</p></div>`;
        return;
      }

      container.innerHTML = `<div class="table-wrapper"><table>
        <thead><tr><th>Date & Time</th><th>Vehicle</th><th>Fuel Type</th><th>Owner</th><th>Fuel Shed</th></tr></thead>
        <tbody>${logs.map(log => `
          <tr>
            <td>${new Date(log.scanned_at).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
            <td><strong>${log.vehicle_id?.vehicle_number || '—'}</strong></td>
            <td><span class="badge ${log.vehicle_id?.fuel_type==='Petrol'?'badge-blue':'badge-orange'}">${log.vehicle_id?.fuel_type||'—'}</span></td>
            <td>${log.user_id?.first_name || ''} ${log.user_id?.last_name || ''}<br><span style="font-size:0.78rem;color:var(--text-muted);">${log.user_id?.mobile||''}</span></td>
            <td>⛽ ${log.fuel_shed_id?.name || '—'}</td>
          </tr>`).join('')}
        </tbody></table></div>`;
    } catch (err) {
      document.getElementById('scanLogsContainer').innerHTML = `<div class="alert alert-error">Failed to load scan logs.</div>`;
    }
  }

  loadStats();
  loadScanLogs();
</script>
</body>
</html>
